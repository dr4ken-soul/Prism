services:
  - type: web
    name: prism
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "8787"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: MEMWAL_DELEGATE_KEY
        sync: false
      - key: MEMWAL_ACCOUNT_ID
        sync: false
      - key: MEMWAL_RELAYER_URL
        sync: false
      - key: MEMWAL_NETWORK
        value: mainnet
